name: CI/CD Pipeline - Task Manager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Build y Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt pytest httpx

      - name: Verificar sintaxis Python
        run: python -m py_compile backend/main.py backend/models.py backend/auth.py backend/database.py

      - name: Build imagen Docker backend
        run: docker build -t taskmanager-backend ./backend

      - name: Build imagen Docker frontend
        run: docker build -t taskmanager-frontend ./frontend

      - name: Instalar docker compose plugin
        run: |
          sudo apt-get update -y
          sudo apt-get install -y docker-compose-plugin

      - name: Levantar servicios y verificar health
        run: |
          docker compose up -d
          sleep 25
          curl -f http://localhost:8000/health && echo "API OK"
          docker compose down

  deploy:
    name: Deploy a AWS EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/taskmanager
            git pull origin main
            docker-compose down
            docker-compose build --no-cache
            docker-compose up -d
            sleep 15
            curl -f http://localhost:8000/health && echo "Deploy exitoso"
